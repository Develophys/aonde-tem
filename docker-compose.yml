services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: aonde
      POSTGRES_PASSWORD: aonde
      POSTGRES_DB: aonde
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aonde"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: { context: ., dockerfile: docker/api.Dockerfile }
    environment:
      DATABASE_URL: postgresql://aonde:aonde@db:5432/aonde
      NODE_ENV: production
      PORT: "3000"
    ports: ["3000:3000"]
    depends_on:
      db: { condition: service_healthy }

  web:
    build: { context: ., dockerfile: docker/web.Dockerfile }
    ports: ["8080:80"]
    depends_on: [api]

volumes:
  pgdata:
