name: Deploy

# Builds the API and web container images and pushes them to GitHub Container
# Registry (GHCR — free for public repos), then runs a (templated) deploy step.
# Triggers on pushes to main and on version tags. (Backlog: AT-111)
#
# Hosting is still an open decision (backlog AT-110). The build/push below works
# for ANY host. Fill in the `deploy` job for your provider when you pick one.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: # allow manual runs

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }} # e.g. owner/aonde_tem

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: docker/api.Dockerfile
          - app: web
            dockerfile: docker/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # The web image needs build-time env (Vite inlines it). Set these as
          # repo variables/secrets, then uncomment:
          # build-args: |
          #   VITE_API_URL=${{ vars.VITE_API_URL }}
          #   VITE_MAP_KEY=${{ secrets.VITE_MAP_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only deploy from main / tags, not from manual test runs on other refs.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      # ───────────────────────────────────────────────────────────────────
      # TODO: wire this to your host once chosen (backlog AT-110). Examples:
      #
      #  • SSH to a VPS and pull the new images:
      #      - uses: appleboy/ssh-action@v1
      #        with:
      #          host: ${{ secrets.DEPLOY_HOST }}
      #          username: ${{ secrets.DEPLOY_USER }}
      #          key: ${{ secrets.DEPLOY_SSH_KEY }}
      #          script: |
      #            cd /srv/aonde-tem
      #            docker compose pull && docker compose up -d
      #            docker compose exec -T api pnpm db:migrate
      #
      #  • Render / Railway / Fly.io: trigger a deploy hook or use their CLI.
      #
