name: CI

# Runs on every PR and on pushes to main. Mirrors the local `turbo` tasks
# so what passes locally passes here. (Backlog: AT-009, AT-103)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Used by Prisma for typecheck/build and by integration tests.
  DATABASE_URL: postgresql://aonde:aonde@localhost:5432/aonde

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect API-relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/contracts/**'
              - 'packages/domain/**'

  verify:
    runs-on: ubuntu-latest

    # PostGIS available for any test that needs the DB.
    services:
      db:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: aonde
          POSTGRES_PASSWORD: aonde
          POSTGRES_DB: aonde
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aonde"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # NOTE: requires a committed pnpm-lock.yaml (backlog AT-005).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @aonde-tem/api exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @aonde-tem/api exec prisma migrate deploy

      - name: Seed database
        run: pnpm run db:seed

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Check bundle size
        run: pnpm --filter @aonde-tem/web size-limit

      - name: Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Install Playwright browsers
        run: pnpm --filter @aonde-tem/web exec playwright install chromium --with-deps

      # The web e2e suite proxies /api to localhost:3000 (see apps/web/vite.config.ts) —
      # nothing else in this job starts the API, so it must be launched here first.
      - name: Start API server
        run: pnpm --filter @aonde-tem/api start &
        env:
          PORT: 3000

      - name: Wait for API
        run: npx wait-on http://localhost:3000/api/health --timeout 30000

      - name: E2E smoke tests
        run: pnpm --filter @aonde-tem/web e2e

  # Design slop gate — fails the build on frontend anti-patterns. (Backlog: AT-117)
  design-slop:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Impeccable slop detector
        run: npx --yes impeccable detect apps/web/src/

  # Static analysis (bugs, vulnerabilities, code smells) via SonarCloud, covering both
  # apps/api and apps/web plus packages/contracts and packages/domain — configured in
  # sonar-project.properties at the repo root.
  sonar-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — SonarCloud needs it for blame/new-code analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Migrates Neon + deploys apps/api to Fly. main-only, and skipped entirely when the
  # push touches nothing api-relevant (see `changes` job) — apps/web deploys itself via
  # Vercel's own Git integration, so it isn't handled here. (Backlog: AT-111)
  deploy-api:
    needs: [verify, design-slop, changes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-api-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations against Neon
        run: pnpm --filter @aonde-tem/api prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy apps/api to Fly.io
        run: flyctl deploy --remote-only --app aonde-tem
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
